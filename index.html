<body>

  
  <header id="waybar" role="banner">
    <div class="waybar-left">
      <button class="waybar-launcher" aria-label="App Launcher" title="Launcher">
        <i class="fa-brands fa-linux" aria-hidden="true"></i>
      </button>
    </div>

    <div class="waybar-center" aria-live="polite">
      <span class="waybar-window-title" id="window-title">ghostty — fastfetch</span>
    </div>

    <div class="waybar-right">
      <span class="waybar-module waybar-clock" id="waybar-clock" title="Time">
        <i class="fa-regular fa-clock" aria-hidden="true"></i>
        <span id="time-display" aria-live="polite"></span>
      </span>
      <span class="waybar-sep" aria-hidden="true">|</span>
      <span class="waybar-module" id="waybar-date" title="Date">
        <i class="fa-regular fa-calendar" aria-hidden="true"></i>
        <span id="date-display" aria-live="polite"></span>
      </span>
    </div>
  </header>

  
  <main id="desktop">

    
    <section class="desktop-left" aria-label="Terminal">
      <div class="window terminal-window" id="terminal-fastfetch">
        <div class="window-titlebar" aria-hidden="true">
          <span class="window-title-text">ghostty — fastfetch</span>
        </div>
        <div class="window-content terminal-content" id="fastfetch-output" role="region" aria-label="About Me">
          
        </div>
      </div>
    </section>

    
    <section class="desktop-right" aria-label="Links and Info">

      <div class="window browser-window" id="widget-links">
        <div class="window-titlebar" aria-hidden="true">
          <span class="window-title-text">chromium — localhost:3000</span>
        </div>
        <div class="window-content browser-window-content" id="links-content">
          
        </div>
      </div>

      <div class="window terminal-window" id="widget-pipes">
        <div class="window-titlebar" aria-hidden="true">
          <span class="window-title-text">ghostty — pipes.sh</span>
        </div>
        <div class="window-content terminal-content" id="pipes-term-output" role="region" aria-label="Pipes Screensaver">
          
        </div>
      </div>

    </section>
  </main>

  <noscript>
    <style>#desktop,#waybar{display:none}</style>
    <p style="font-family:monospace;color:#cdd6f4;background:#1e1e2e;padding:2rem;text-align:center">
      JavaScript is required to view this site.
    </p>
  </noscript>
